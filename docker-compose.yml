services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: futsal
      POSTGRES_USER: futsal
      POSTGRES_PASSWORD: futsal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futsal -d futsal"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: futsal
      DB_USERNAME: futsal
      DB_PASSWORD: futsal
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-CHANGE_ME_GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_SUPER_SECRET_DEV_32_BYTES_MIN_0123456789abcdef}
      JWT_ISSUER: ${JWT_ISSUER:-futsalkita}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-120}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-CHANGE_ME_GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:

