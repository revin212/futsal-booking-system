server:
  port: 8080

spring:
  application:
    name: futsal
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  google:
    clientId: ${GOOGLE_CLIENT_ID:CHANGE_ME_GOOGLE_CLIENT_ID}
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_SUPER_SECRET_DEV_32_BYTES_MIN_0123456789abcdef}
    issuer: ${JWT_ISSUER:futsalkita}
    accessTtlMinutes: ${JWT_ACCESS_TTL_MINUTES:120}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:futsal}
    username: ${DB_USERNAME:futsal}
    password: ${DB_PASSWORD:futsal}
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false

