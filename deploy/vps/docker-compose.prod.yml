# Override untuk produksi (dipakai bersama deploy/vps/docker-compose.app-only.yml).
# Postgres tidak didefinisikan di sini; gunakan stack infra bersama (lihat README.docker.md).

services:
  backend:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    ports:
      # Bind ke loopback supaya hanya bisa diakses via Nginx host (TLS).
      - "127.0.0.1:8080:80"

