# Produksi VPS: backend + frontend saja; Postgres berjadi sebagai stack infra terpisah
# (satu container bersama, lihat README.docker.md dan docker-compose.postgres-infra.example.yml).
# Jalankan dari root repo:
#   docker compose -f deploy/vps/docker-compose.app-only.yml -f deploy/vps/docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${DB_HOST:-shared-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-futsal}
      DB_USERNAME: ${DB_USERNAME:-futsal}
      DB_PASSWORD: ${DB_PASSWORD:-futsal}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-CHANGE_ME_GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_SUPER_SECRET_DEV_32_BYTES_MIN_0123456789abcdef}
      JWT_ISSUER: ${JWT_ISSUER:-futsalkita}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-120}
    networks:
      - default
      - shared-db-net

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-CHANGE_ME_GOOGLE_CLIENT_ID}
        VITE_ADMIN_WA_NUMBER: ${ADMIN_WA_NUMBER:-+6281234567890}
    depends_on:
      - backend
    networks:
      - default

networks:
  shared-db-net:
    external: true
    name: ${SHARED_DB_NETWORK:-shared-db-net}
