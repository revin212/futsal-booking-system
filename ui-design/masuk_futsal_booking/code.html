<!-- TopNavBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md full-width top-0 sticky z-50 border-b border-slate-200 dark:border-slate-800 shadow-sm max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16 w-full">
<div class="text-xl font-bold text-green-600 dark:text-green-500 font-lexend">FutsalKita</div>
<nav class="hidden md:flex space-x-8">
<a class="text-slate-600 dark:text-slate-400 font-lexend text-sm hover:text-green-600 dark:hover:text-green-400 transition-colors active:scale-95 duration-200" href="#">Beranda</a>
<a class="text-slate-600 dark:text-slate-400 font-lexend text-sm hover:text-green-600 dark:hover:text-green-400 transition-colors active:scale-95 duration-200" href="#">Katalog</a>

<div class="flex items-center space-x-4">
<!-- Trailing Action is intentionally omitted or simplified for Login state focus -->
<button class="text-slate-600 dark:text-slate-400 hover:text-green-600 dark:hover:text-green-400 transition-colors">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>

</div>

<div class="relative z-10 w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-outline-variant/30 overflow-hidden flex flex-col">
<div class="p-8 sm:p-10 flex-grow">
<div class="text-center mb-8">
<h1 class="font-h1 text-h1 text-on-surface mb-2">Selamat Datang</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Masuk untuk booking &amp; lihat riwayat</p>
</div>
<div class="space-y-stack-md">
<!-- Google SSO Button -->
<button class="w-full flex items-center justify-center gap-3 bg-surface hover:bg-surface-container text-on-surface border border-outline-variant/60 rounded-lg py-3 px-4 transition-all duration-200 shadow-sm active:scale-[0.98]">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

<div class="flex-grow border-t border-outline-variant/40"></div>
</div>
<!-- Email Form -->
<form class="space-y-4" onsubmit="event.preventDefault();">
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-2.5 text-on-surface font-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-colors outline-none" id="email" placeholder="nama@email.com" required="" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="password">Kata Sandi</label>
<a class="font-label-md text-label-md text-primary hover:text-surface-tint" href="#">Lupa sandi?</a>
</div>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-2.5 text-on-surface font-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-colors outline-none pr-12" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md py-3 rounded-lg transition-colors shadow-sm mt-2 active:scale-[0.98]" type="submit">
                            Pesan Sekarang
                        </button>
</form>
</div>
</div>
<!-- Footer area within card for terms -->
<div class="bg-surface-container-low px-8 py-5 text-center border-t border-outline-variant/20">
<p class="font-body-sm text-body-sm text-on-surface-variant">

                </p>
</div>

<footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 w-full mt-auto relative z-20">
<div class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-2 gap-8 items-center text-center md:text-left">
<div>
<span class="text-lg font-bold text-slate-900 dark:text-white font-lexend block mb-2">FutsalKita</span>
